<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gigity — Workflow View</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --background: #ffffff;
    --foreground: #09090b;
    --card: #ffffff;
    --muted: #f4f4f5;
    --muted-foreground: #71717a;
    --secondary: #f4f4f5;
    --secondary-foreground: #18181b;
    --accent: #f4f4f5;
    --accent-foreground: #18181b;
    --border: #e4e4e7;
    --input: #e4e4e7;
    --primary: #18181b;
    --primary-foreground: #fafafa;
    --destructive: #ef4444;
    --success: #16a34a;
    --success-bg: #f0fdf4;
    --success-border: #bbf7d0;
    --success-text: #15803d;
    --warning-bg: #fffbeb;
    --warning-text: #b45309;
    --warning-border: #fde68a;
    --ring: #18181b;
    --sidebar-bg: #fafafa;
    --sidebar-w: 220px;
    --header-h: 52px;
    --radius: 0.5rem;
    --radius-md: 0.375rem;
    --radius-sm: 0.25rem;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font);
    background: var(--background);
    color: var(--foreground);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column; min-height: 100vh;
  }

  /* Header */
  .header {
    position: sticky; top: 0; z-index: 40; flex-shrink: 0;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    height: var(--header-h);
  }
  .header-inner {
    padding: 0 20px; height: 100%;
    display: flex; align-items: center; gap: 10px;
  }
  .back-link {
    display: flex; align-items: center; gap: 5px;
    text-decoration: none; color: var(--muted-foreground);
    font-size: 13px; font-weight: 500; transition: color .12s; white-space: nowrap;
  }
  .back-link:hover { color: var(--foreground); }
  .sep { color: var(--border); }
  .project-name {
    font-size: 13px; font-weight: 600; color: var(--foreground);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px;
  }
  .header-spacer { flex: 1; }
  .progress-wrap { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .progress-label { font-size: 12px; font-weight: 500; color: var(--muted-foreground); }
  .progress-track { width: 72px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; background: var(--primary); transition: width .35s ease; }
  .badge-completed {
    font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 9999px;
    background: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-border); display: none;
  }

  /* Demo tabs */
  .demo-toggle {
    display: inline-flex; background: var(--muted); border-radius: var(--radius-md);
    padding: 2px; border: 1px solid var(--border); margin-left: 8px; flex-shrink: 0;
  }
  .demo-tab {
    font-size: 11px; font-weight: 500; padding: 4px 10px;
    border-radius: calc(var(--radius-md) - 2px); cursor: pointer;
    color: var(--muted-foreground); border: none; background: none;
    font-family: var(--font); transition: background .1s, color .1s; white-space: nowrap;
  }
  .demo-tab.active { background: var(--background); color: var(--foreground); box-shadow: 0 1px 2px rgba(0,0,0,.08); }

  /* Workspace */
  .workspace { display: flex; flex: 1; overflow: hidden; height: calc(100vh - var(--header-h)); }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-w); border-right: 1px solid var(--border);
    background: var(--sidebar-bg); overflow-y: auto; flex-shrink: 0;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .sidebar-header {
    padding: 14px 12px 8px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted-foreground);
    border-bottom: 1px solid var(--border);
  }

  /* Step items */
  .step-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; cursor: pointer; user-select: none;
    border-left: 2px solid transparent;
    transition: background .1s, border-color .1s;
  }
  .step-item:hover:not(.locked) { background: var(--accent); }
  .step-item.active { background: var(--accent); border-left-color: var(--primary); }
  .step-item.locked { cursor: default; opacity: 0.45; }

  .step-icon {
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 10px; font-weight: 700;
    border: 1.5px solid var(--border); color: var(--muted-foreground);
    background: var(--background); transition: border-color .1s, background .1s;
  }
  .step-item.done .step-icon { border-color: var(--success); background: var(--success-bg); color: var(--success); }
  .step-item.active .step-icon { border-color: var(--primary); background: var(--primary); color: var(--primary-foreground); }

  .step-label { flex: 1; min-width: 0; }
  .step-num { font-size: 10px; font-weight: 600; color: var(--muted-foreground); letter-spacing: 0.02em; }
  .step-name { font-size: 12px; font-weight: 500; color: var(--muted-foreground); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .step-item.active .step-name { color: var(--foreground); font-weight: 600; }
  .step-item.done .step-name { color: var(--muted-foreground); }

  /* Main panel */
  .panel {
    flex: 1; overflow-y: auto; padding: 28px 32px 60px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .panel::-webkit-scrollbar { width: 5px; }
  .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .step-card { max-width: 660px; }

  /* Step header */
  .step-card-meta {
    font-size: 12px; color: var(--muted-foreground); font-weight: 500;
    margin-bottom: 4px; display: flex; align-items: center; gap: 8px;
  }
  .tool-badge {
    font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
    padding: 2px 7px; border-radius: var(--radius-sm);
    background: var(--secondary); border: 1px solid var(--border);
    color: var(--muted-foreground);
  }
  .step-card-title { font-size: 22px; font-weight: 700; letter-spacing: -0.025em; margin-bottom: 4px; }
  .step-card-sub { font-size: 13px; color: var(--muted-foreground); margin-bottom: 24px; }

  /* Done banner — shadcn Alert style */
  .done-banner {
    display: flex; align-items: center; gap: 10px;
    background: var(--success-bg); border: 1px solid var(--success-border);
    border-radius: var(--radius-md); padding: 10px 14px; margin-bottom: 20px;
    font-size: 13px; color: var(--success-text); font-weight: 500;
  }

  /* Prompt box */
  .prompt-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.07em;
    text-transform: uppercase; color: var(--muted-foreground); margin-bottom: 8px;
  }
  .prompt-box {
    background: var(--muted); border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 14px 16px;
    font-family: var(--mono); font-size: 12px; line-height: 1.75;
    color: var(--foreground); white-space: pre-wrap; word-break: break-word;
  }
  .prompt-box .var { color: #7c3aed; font-weight: 500; }
  .copy-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; margin-bottom: 24px; }
  .copy-hint { font-size: 12px; color: var(--muted-foreground); }

  /* Instruction card */
  .instruction-card {
    background: var(--muted); border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 16px 18px; margin-bottom: 24px;
  }
  .instruction-card p { font-size: 14px; color: var(--foreground); line-height: 1.7; white-space: pre-line; }
  .ext-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500; color: #2563eb; text-decoration: none;
    margin-top: 14px; border: 1px solid #bfdbfe; border-radius: var(--radius-md);
    padding: 7px 12px; background: #eff6ff; transition: background .12s;
  }
  .ext-link:hover { background: #dbeafe; }

  /* Output fields */
  .output-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.07em;
    text-transform: uppercase; color: var(--muted-foreground); margin-bottom: 8px;
  }
  .output-textarea, .output-url {
    width: 100%; background: var(--background);
    border: 1px solid var(--input); border-radius: var(--radius-md);
    color: var(--foreground); font-family: var(--font);
    font-size: 14px; padding: 9px 12px; outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .output-textarea { resize: vertical; min-height: 96px; line-height: 1.6; }
  .output-textarea:focus, .output-url:focus {
    border-color: var(--ring); box-shadow: 0 0 0 2px rgba(24,24,27,.1);
  }
  .output-textarea::placeholder, .output-url::placeholder { color: var(--muted-foreground); }
  .output-section { margin-bottom: 16px; }
  .url-label-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted-foreground); }

  /* Expiry warning */
  .expiry-warn {
    display: flex; align-items: flex-start; gap: 8px;
    background: var(--warning-bg); border: 1px solid var(--warning-border);
    border-radius: var(--radius-md); padding: 9px 12px; margin-top: 8px;
    font-size: 12px; color: var(--warning-text); line-height: 1.5;
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font); font-size: 14px; font-weight: 500;
    padding: 8px 14px; border-radius: var(--radius-md); cursor: pointer;
    border: 1px solid transparent; transition: background .12s, box-shadow .12s;
    white-space: nowrap; line-height: 1;
  }
  .btn-default { background: var(--primary); color: var(--primary-foreground); border-color: var(--primary); }
  .btn-default:hover { background: #27272a; }
  .btn-default.success-state { background: var(--success); border-color: var(--success); }
  .btn-outline { background: var(--background); color: var(--foreground); border-color: var(--border); }
  .btn-outline:hover { background: var(--accent); }
  .btn-sm { font-size: 13px; padding: 6px 11px; }

  /* Action row */
  .action-row {
    display: flex; align-items: center; gap: 12px;
    margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border);
  }
  .action-hint { font-size: 12px; color: var(--muted-foreground); }

  /* Responsive */
  @media (max-width: 700px) {
    .workspace { flex-direction: column; height: auto; overflow: visible; }
    .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); overflow-x: auto; display: flex; }
    .sidebar-header { display: none; }
    .step-item { min-width: 56px; flex-direction: column; align-items: center; gap: 3px; padding: 10px 8px; border-left: none; border-bottom: 2px solid transparent; }
    .step-item.active { border-bottom-color: var(--primary); border-left: none; }
    .step-label { text-align: center; }
    .step-name { display: none; }
    .panel { padding: 20px 16px 40px; }
    .demo-toggle { display: none; }
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="/" class="back-link">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3L5 7L9 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Dashboard
    </a>
    <span class="sep">/</span>
    <span class="project-name">Deewas — April salary season campaign</span>
    <div class="header-spacer"></div>
    <div class="progress-wrap" id="progress-wrap">
      <span class="progress-label" id="progress-label">2 / 10</span>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:20%"></div></div>
    </div>
    <span class="badge-completed" id="badge-completed">Completed</span>
    <div class="demo-toggle">
      <button class="demo-tab active" onclick="setDemo(3, this)">Step 3</button>
      <button class="demo-tab" onclick="setDemo(8, this)">Step 8</button>
      <button class="demo-tab" onclick="setDemo(2, this)">Done step</button>
    </div>
  </div>
</header>

<div class="workspace">
  <nav class="sidebar" aria-label="Workflow steps">
    <div class="sidebar-header">Steps</div>
    <div id="step-list"></div>
  </nav>
  <main class="panel" id="panel"></main>
</div>

<script>
const STEPS = [
  { n:1,  title:'Business context',  tool:'Gigity',  type:'external' },
  { n:2,  title:'Reference videos',  tool:'Gigity',  type:'external' },
  { n:3,  title:'Generate story',    tool:'ChatGPT', type:'prompt'   },
  { n:4,  title:'Story to lyrics',   tool:'ChatGPT', type:'prompt'   },
  { n:5,  title:'Music prompt',      tool:'ChatGPT', type:'prompt',  hasUrl: true, expiry: true },
  { n:6,  title:'Character images',  tool:'ChatGPT', type:'prompt',  hasUrl: true, expiry: true },
  { n:7,  title:'Scene images',      tool:'ChatGPT', type:'prompt',  hasUrl: true, expiry: true },
  { n:8,  title:'Animate scenes',    tool:'KlingAI', type:'external', hasUrl: true, expiry: true },
  { n:9,  title:'Assemble video',    tool:'CapCut',  type:'external' },
  { n:10, title:'Upload & publish',  tool:'Manual',  type:'external' },
];

const PROMPTS = {
  3: `You are helping me write an advertising story for <span class="var">Deewas</span>.

App: <span class="var">Personal financial management app with AI</span>
Audience: <span class="var">Young adults 22-30 managing their first salary</span>
Tone: <span class="var">Warm, encouraging, modern — not preachy</span>
Character: <span class="var">Minh, 25-year-old office worker, friendly</span>
Platforms: <span class="var">TikTok, YouTube Shorts</span>

Write a short advertising story for a 30-60 second video. 4-6 scenes. Follow Minh through a moment of money stress → discovering Deewas → relief. End on an emotional beat, not a feature list. No voiceover — show don't tell.`,
  4: `Using the story from step 3:

[paste story here]

Rewrite as song lyrics for SunoAI:
- Verse 1 (2-4 lines): the problem
- Chorus (2-3 lines): the turning point
- Verse 2 (2-4 lines): the resolution
- Outro (1-2 lines): brand feeling

Keep lines short. Priority: emotional impact and natural rhythm.`,
  5: `Using lyrics from step 4:

[paste lyrics here]

Create a SunoAI music prompt:
- Genre: soft lo-fi / chill pop / acoustic indie
- Mood: warm, hopeful, modern
- Tempo: medium
- 3-4 specific instruments
- Duration: ~45-60 seconds

Include the full lyrics. Format as a single block ready to paste into SunoAI.`,
  6: `Create an image prompt for character <span class="var">Minh</span>.

Character: <span class="var">25-year-old Vietnamese office worker, friendly, casual-smart clothing</span>
Reference: <span class="var">https://drive.google.com/minh-reference.jpg</span>
Style: Warm illustration, clean background, 9:16 frame
Emotion: Stressed but hopeful

Generate a Midjourney/DALL-E prompt with style modifiers, lighting, and framing. No text in image.`,
  7: `For each scene in the story:

[paste story from step 3]

Character: <span class="var">Minh, 25-year-old office worker</span>
Style: Warm illustration, 9:16 aspect ratio, consistent character look

For each scene output:
Scene N: [description]
Prompt: [full Midjourney/DALL-E prompt]`,
};

const INSTRUCTIONS = {
  1: { text: 'Your brand profile is already configured.\n\nProduct: Deewas — Personal financial management app with AI\nAudience: Young adults 22-30\nTone: Warm, encouraging, modern\nCharacter: Minh (25-year-old office worker)\n\nAll context is injected into every generated prompt automatically.', link: null },
  2: { text: 'Reference videos saved:\n• https://tiktok.com/@deewas.app/video/12345\n• https://youtube.com/shorts/abc123\n\nThese are included in the step 3 prompt so ChatGPT can see your preferred storytelling style.', link: null },
  8: { text: 'Open KlingAI. Upload each scene image from step 7 using "Image to Video" mode.\n\nSettings:\n• Duration: 5-8 seconds per clip\n• Motion: subtle\n• Quality: Standard\n\nDownload each clip before the URL expires (24-72 hours).', link: 'https://klingai.com', label: 'Open KlingAI →' },
  9: { text: 'Open CapCut and assemble:\n1. Import video clips in story order\n2. Import SunoAI music track\n3. Trim to 30-60 seconds total\n4. Add logo overlay (https://deewas.app/logo.png)\n5. Export 1080×1920 (9:16)', link: 'https://capcut.com', label: 'Open CapCut →' },
  10: { text: 'Upload the final video:\n• TikTok: New post → Upload\n• YouTube Shorts: Upload → Set visibility\n• Instagram Reels: New reel → Upload\n\nMark done to complete the project.', link: null },
};

let doneSteps = new Set([1, 2]);
let activeStep = 3;

function buildSidebar() {
  const list = document.getElementById('step-list');
  list.innerHTML = '';
  STEPS.forEach(step => {
    const isDone = doneSteps.has(step.n);
    const isActive = step.n === activeStep;
    const isLocked = !isDone && step.n > activeStep;
    const div = document.createElement('div');
    div.className = ['step-item', isDone ? 'done' : '', isActive ? 'active' : '', isLocked ? 'locked' : ''].filter(Boolean).join(' ');
    div.onclick = () => { if (!isLocked) selectStep(step.n); };
    div.innerHTML = `
      <div class="step-icon">${isDone
        ? '<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>'
        : isLocked
        ? '<svg width="9" height="11" viewBox="0 0 9 11" fill="none"><rect x="1" y="4.5" width="7" height="5.5" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M2.5 4.5V3C2.5 1.9 3.4 1 4.5 1S6.5 1.9 6.5 3V4.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>'
        : step.n
      }</div>
      <div class="step-label">
        <div class="step-num">Step ${step.n}</div>
        <div class="step-name">${step.title}</div>
      </div>`;
    list.appendChild(div);
  });
}

function buildPanel(n) {
  const step = STEPS.find(s => s.n === n);
  const isDone = doneSteps.has(n);
  const isLocked = !isDone && n > activeStep;
  let html = '<div class="step-card">';

  // Header
  html += `<div class="step-card-meta">Step ${n} of 10 <span class="tool-badge">${step.tool}</span></div>
    <div class="step-card-title">${step.title}</div>
    <div class="step-card-sub">${getSubtitle(n)}</div>`;

  // Done banner
  if (isDone) html += `<div class="done-banner">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2.5 7.5L6 11L12.5 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Step completed
  </div>`;

  if (step.type === 'prompt') {
    const prompt = PROMPTS[n] || `[Generated prompt for step ${n} — brand context injected automatically]`;
    html += `<div class="prompt-label">Generated Prompt</div>
      <div class="prompt-box">${prompt}</div>
      <div class="copy-row">
        <span class="copy-hint">Open ChatGPT, paste this prompt, copy the output below</span>
        <button class="btn btn-default btn-sm" onclick="copyPrompt(this, ${n})">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="3.5" y="3.5" width="7.5" height="7.5" rx="1.2" stroke="currentColor" stroke-width="1.2"/><path d="M1 8.5V2C1 1.4 1.4 1 2 1H8.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          Copy prompt
        </button>
      </div>`;
  } else {
    const instr = INSTRUCTIONS[n] || { text: 'Follow the steps for this tool.', link: null };
    html += `<div class="instruction-card">
      <p>${esc(instr.text)}</p>
      ${instr.link ? `<a href="${instr.link}" target="_blank" class="ext-link">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M6.5 1H10V4.5M10 1L5 6M1.5 3H3.5M1.5 3V9.5H8V7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        ${instr.label}
      </a>` : ''}
    </div>`;
  }

  // Output fields
  if (n >= 3) {
    const needsText = [3,4,5,6,7].includes(n);
    if (needsText) {
      html += `<div class="output-section">
        <div class="output-label">Your output from ${step.tool}</div>
        <textarea class="output-textarea" placeholder="Paste the ${step.tool} response here...">${isDone ? '[Output saved]' : ''}</textarea>
      </div>`;
    }
    if (step.hasUrl) {
      html += `<div class="output-section">
        <div class="url-label-row">
          Asset URL
          ${step.expiry ? `<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><circle cx="5.5" cy="5.5" r="4.5" stroke="currentColor" stroke-width="1.1"/><path d="M5.5 3V5.5L7 7" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>` : ''}
        </div>
        <input class="output-url" type="url" placeholder="Paste the image / audio / video URL...">
        ${step.expiry ? `<div class="expiry-warn">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" style="flex-shrink:0;margin-top:1px"><circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.2"/><path d="M6.5 4V6.5L8 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          AI tool URLs expire in 24-72 hours. Download and re-host on Google Drive or Dropbox before saving.
        </div>` : ''}
      </div>`;
    }
  }

  // Action row
  if (isDone) {
    html += `<div class="action-row"><span class="action-hint">This step is complete. Click the next step in the sidebar to continue.</span></div>`;
  } else if (isLocked) {
    html += `<div class="action-row"><span class="action-hint">Complete step ${n - 1} first to unlock this step.</span></div>`;
  } else {
    const next = STEPS.find(s => s.n === n + 1);
    html += `<div class="action-row">
      <button class="btn btn-default" onclick="markDone(${n})">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5L5 9.5L11 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        ${n === 10 ? 'Complete project' : 'Mark step done'}
      </button>
      <span class="action-hint">${n === 10 ? 'Marks the project as completed.' : `Advances to step ${n + 1}${next ? ': ' + next.title : ''}`}</span>
    </div>`;
  }

  html += '</div>';
  document.getElementById('panel').innerHTML = html;

  // Auto-resize textareas
  document.querySelectorAll('.output-textarea').forEach(el => {
    el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px';
    el.addEventListener('input', () => { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; });
  });
}

function getSubtitle(n) {
  const subs = {
    1: 'Your brand profile is configured with all context.',
    2: 'Reference videos saved in your brand profile.',
    3: 'Generate the advertising story that drives the video narrative.',
    4: 'Turn the story into SunoAI-ready song lyrics.',
    5: 'Create the SunoAI prompt and generate your music track.',
    6: 'Generate character reference images for the story.',
    7: 'One image prompt per scene — paste into your image tool.',
    8: 'Send each scene image to KlingAI to create video clips.',
    9: 'Assemble clips, music, and logo in CapCut.',
    10: 'Upload the final video to all platforms.',
  };
  return subs[n] || '';
}

function selectStep(n) {
  activeStep = Math.max(activeStep, n <= activeStep ? activeStep : n);
  buildSidebar();
  buildPanel(n);
  // Scroll sidebar item into view
  const items = document.querySelectorAll('.step-item');
  if (items[n - 1]) items[n - 1].scrollIntoView({ block: 'nearest' });
}

function markDone(n) {
  doneSteps.add(n);
  const next = n + 1;
  if (next <= 10) activeStep = next;
  buildSidebar();
  buildPanel(activeStep);
  updateHeader();
}

function updateHeader() {
  const done = doneSteps.size;
  document.getElementById('progress-label').textContent = `${done} / 10`;
  document.getElementById('progress-fill').style.width = `${done * 10}%`;
  const complete = done === 10;
  document.getElementById('progress-wrap').style.display = complete ? 'none' : 'flex';
  document.getElementById('badge-completed').style.display = complete ? '' : 'none';
}

function setDemo(n, btn) {
  if (n === 8) { doneSteps = new Set([1,2,3,4,5,6,7]); activeStep = 8; }
  else if (n === 2) { doneSteps = new Set([1,2]); activeStep = 2; n = 2; }
  else { doneSteps = new Set([1,2]); activeStep = 3; n = 3; }
  btn.closest('.demo-toggle').querySelectorAll('.demo-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  buildSidebar(); buildPanel(n); updateHeader();
}

function copyPrompt(btn, n) {
  const box = btn.closest('.step-card').querySelector('.prompt-box');
  navigator.clipboard.writeText(box ? box.innerText : '').then(() => {
    btn.classList.add('success-state');
    btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1.5 6L4.5 9L10.5 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg> Copied!`;
    setTimeout(() => {
      btn.classList.remove('success-state');
      btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="3.5" y="3.5" width="7.5" height="7.5" rx="1.2" stroke="currentColor" stroke-width="1.2"/><path d="M1 8.5V2C1 1.4 1.4 1 2 1H8.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg> Copy prompt`;
    }, 2200);
  }).catch(() => {});
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

buildSidebar(); buildPanel(3); updateHeader();
</script>
</body>
</html>
